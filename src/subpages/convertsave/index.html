<!DOCTYPE html>
<html>
	<head>
		<title>NSF Converter</title>
		<link rel="stylesheet" href="./css.css" />
		<!--
		<script>if (!location.href.endsWith('/')) location.href += '/';</script>
		-->
	</head>
	<body>
		<a id='status'></a>
		<h1>Noema Save File Converter</h1>
		<h2 class="underline">Select a save file...</h2>
		<input type="file" id="file" accept=".nsf"/>
		<div id='convert' style="display: none;">
			<br>
			<br>
			<a class="head">Select a format to convert to...</a>
			<br>
			<select id='convert-to'></select>
			<br>
			<br>
			<button id='convert-btn'>Convert!</button>
		</div>
		<script src="./js.js"></script>
	</body>
</html>
