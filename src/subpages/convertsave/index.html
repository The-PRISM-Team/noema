<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>NSF Converter</title>
	<link rel="stylesheet" href="./css.css" />
	<script>
	if (!location.href.endsWith('/') && !location.hash && location.origin !== 'file://') location.href += '/';
	else if (location.pathname.endsWith('/index.html/')) location.href = /(.+)\/index\.html\/?/.exec(location.href)[1]; 
	</script>
</head>
<body>
	<a id='status'></a>
	<h1>Noema Save File Converter</h1>
	<h2 class="underline">Select a save file...</h2>
	<input type="file" id="file" accept=".nsf"/>
	<div id='convert' style="display: none;">
		<br>
		<br>
		<h2 class="underline">Select a format to convert to...</h2>
		<br>
		<select id='convert-to'></select>
		<br>
		<br>
		<button id='convert-btn'>Convert!</button>
	</div>
	<script src="./js.js"></script>
</body>
</html>
