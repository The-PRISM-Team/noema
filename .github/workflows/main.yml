name: Convert JSON locales to JS

on: push

permissions:
  contents: write

jobs:
  convert-locales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false          

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install fs-extra

      - name: Convert JSON to JS
        run: |
          node <<'EOF'
          const fs = require('fs-extra');
          const path = require('path');

          const inputDir = 'src/locales-json';
          const outputDir = 'src/locales';

          fs.ensureDirSync(outputDir);

          const files = fs.readdirSync(inputDir).filter(f => f.endsWith('.json'));

          for (const file of files) {
            const jsonPath = path.join(inputDir, file);
            const jsPath = path.join(outputDir, file.replace('.json', '.js'));

            const data = fs.readJsonSync(jsonPath, { encoding: 'utf8' });
            const jsonStr = JSON.stringify(data, null, 4);

            const jsContent = `globalThis.localesArray = globalThis.localesArray ?? [];\nglobalThis.localesArray.push(${jsonStr});\n`;

            fs.writeFileSync(jsPath, jsContent, { encoding: 'utf8' });
            console.log(`Converted ${file} → ${path.basename(jsPath)}`);
          }
          EOF
      
      - name: Commit and push JS files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/locales/*.js
          git commit -m "Update generated JS locales from JSON" || echo "No changes to commit"
          BRANCH=${GITHUB_REF#refs/heads/}
          git push origin HEAD